name: ML Competition Evaluation

on:
  pull_request:
    branches: [main]
    paths: ['submissions/*.csv']

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Récupère tout l'historique pour pouvoir push sans erreur
          ref: main      # Se place sur main pour garantir que le leaderboard est à jour

      - name: Checkout PR submission
        uses: actions/checkout@v3
        with:
          path: 'pr_content' # On télécharge la PR dans un sous-dossier pour isoler le CSV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn

      - name: Run Evaluation
        run: |
          # On cherche le fichier CSV dans le dossier de la PR
          SUB_FILE=$(ls pr_content/submissions/*.csv | head -n 1)
          echo "Évaluation de : $SUB_FILE"
          
          # On s'assure que le dossier submissions existe sur main pour le script
          mkdir -p submissions
          cp "$SUB_FILE" submissions/
          
          python evaluation/evaluate.py --submission "submissions/$(basename "$SUB_FILE")"

      - name: Update Leaderboard
        run: python leaderboard/update_leaderboard.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          git add leaderboard/leaderboard.csv evaluation/results/*.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update leaderboard [skip ci]"
            # On rebase au cas où une autre action a modifié le leaderboard entre temps
            git pull origin main --rebase
            git push origin HEAD:main
          fi